server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # 安全加固 (P1-6): 关闭 server_tokens, 阻止响应头泄露 nginx 版本
    server_tokens off;

    # gzip
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml font/ttf font/otf application/wasm;
    gzip_vary on;
    gzip_proxied expired no-cache no-store private auth;

    # 全局安全 headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    # CSP 默认 'self'; myprint-design / vue 内联样式单独加 'unsafe-inline' 兼容 (生产可改 nonce)
    # 注意: 'unsafe-inline' 会削弱 XSS 防护; 如果未来 CSP 收紧, 需将内联样式迁到外部 CSS
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self'" always;

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 始终不缓存, 让浏览器每次拿最新入口 (解决 Vite 构建后老 bundle 缓存问题)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "Thu, 01 Jan 1970 00:00:00 GMT";
        add_header Vary "Accept-Encoding" always;
    }

    # 静态资源 (带 hash 文件名) 永久缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # 接口反代
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        client_max_body_size 100M;
    }
}
