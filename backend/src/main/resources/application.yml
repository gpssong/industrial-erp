server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: industrial-erp
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/industrial_erp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      password:
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  freemarker:
    template-loader-path: classpath:/templates
    suffix: .ftl
    charset: UTF-8
  task:
    scheduling:
      pool:
        core-size: 4

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.industrial.erp.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      insert-strategy: not_null
      update-strategy: not_null

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-read-header: true
  jwt-secret-key: industrial-erp-jwt-secret-key-2026-must-be-long-enough

erp:
  upload:
    path: /opt/industrial-erp/upload
  print:
    template-path: classpath:/templates/print

logging:
  level:
    root: INFO
    com.industrial.erp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
