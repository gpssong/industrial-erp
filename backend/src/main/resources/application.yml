server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  application:
    name: industrial-erp
  # 默认 dev profile. 生产用 SPRING_PROFILES_ACTIVE=prod 切换 (docker-compose.yml 已设).
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mvc:
    servlet:
      encoding:
        charset: UTF-8
        force: true
        enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${SPRING_DATASOURCE_HOST:127.0.0.1}:${SPRING_DATASOURCE_PORT:3306}/${SPRING_DATASOURCE_DB:industrial_erp}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 3
      idle-timeout: 300000
      max-lifetime: 600000
      keepalive-time: 60000
      connection-timeout: 5000
      connection-test-query: "SELECT 1"
      leak-detection-threshold: 10000
      pool-name: erp-hikari
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  freemarker:
    template-loader-path: classpath:/templates
    suffix: .ftl
    charset: UTF-8
  task:
    scheduling:
      pool:
        core-size: 4

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.industrial.erp.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      update-strategy: not_null

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-read-header: true
  is-read-cookie: true
  is-read-query: false
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY:?SA_TOKEN_JWT_SECRET_KEY_must_be_set_64+_chars_random_Generate_with_openssl_rand_hex_32}
  cookie:
    http-only: true
    secure: false
    same-site: Lax
    path: /

erp:
  upload:
    path: ${ERP_UPLOAD_PATH:/opt/industrial-erp/upload}
  cors:
    allowed-origins: ${ERP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:8080}
  backup:
    path: ${ERP_BACKUP_PATH:${user.home}/erp-backup}
    sql-path: ${ERP_BACKUP_SQL_PATH:./sql}
    mysqldump-path: ${ERP_MYSQLDUMP:mysqldump}
    mysql-path: ${ERP_MYSQL:mysql}
    db-host: ${ERP_DB_HOST:mysql}
    db-port: ${ERP_DB_PORT:3306}
    retention-days: ${ERP_BACKUP_RETENTION_DAYS:30}

# ============ 默认 (dev) 配置 ============
logging:
  level:
    root: INFO
    com.industrial.erp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
