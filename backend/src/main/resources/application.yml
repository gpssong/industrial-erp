server:
  port: 8080
  servlet:
    context-path: /api
    # 强制所有响应 / 请求 Content-Type 带 charset=UTF-8, 防止 application/json 缺 charset 时浏览器按 GBK 解码中文
    encoding:
      charset: UTF-8
      force: true
      enabled: true

spring:
  application:
    name: industrial-erp
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
    # Jackson 全局强制 UTF-8 (Spring Boot 3.x 直接通过 spring.mvc.servlet.encoding 控制即可)
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  # Spring MVC 的请求/响应编码 (Tomcat, Spring 3.2+)
  mvc:
    servlet:
      encoding:
        charset: UTF-8
        force: true
        enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${SPRING_DATASOURCE_HOST:127.0.0.1}:${SPRING_DATASOURCE_PORT:3306}/${SPRING_DATASOURCE_DB:industrial_erp}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:850225sonG}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 3
      # 空闲超时 (默认 600000 = 10 分钟). 超过此时间且池 > min-idle 时, 释放连接
      idle-timeout: 300000
      # 连接最大生命周期 (默认 1800000 = 30 分钟). 缩短到 10 分钟, 强制回收陈旧连接
      max-lifetime: 600000
      # 连接保活检测 (默认 0 = 关闭). 每隔 1 分钟 ping 一次数据库, 提前发现已被 MySQL 关闭的连接
      keepalive-time: 60000
      # 获取连接超时 (默认 30000 = 30s). 缩短为 5s, 让前端能快速感知后端故障
      connection-timeout: 5000
      # 连接测试查询 (MySQL 推荐: SELECT 1)
      connection-test-query: "SELECT 1"
      # 泄漏检测: 超过 10 秒未关闭的连接视为泄漏, 打印警告日志
      leak-detection-threshold: 10000
      pool-name: erp-hikari
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
  freemarker:
    template-loader-path: classpath:/templates
    suffix: .ftl
    charset: UTF-8
  task:
    scheduling:
      pool:
        core-size: 4

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.industrial.erp.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # update-strategy: not_null (默认) — UPDATE 时跳过值为 null 的字段
      # 这样 updateById(entity) 只会更新已显式 set 的字段, 避免部分更新时误清空其他字段
      # 如需把字段更新为 null, 必须使用 UpdateWrapper 或 LambdaUpdateWrapper 显式 .set("field", null)
      # 历史踩坑: SysUserService.updatePassword 必须只 set password + id, 不能 set 其他字段,
      # 否则会被 not_null 策略下重新查询覆盖 (见 commit 3664898)
      update-strategy: not_null

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-read-header: true
  is-read-cookie: false
  is-read-query: true
  jwt-secret-key: industrial-erp-jwt-secret-key-2026-must-be-long-enough

erp:
  upload:
    path: ${ERP_UPLOAD_PATH:/opt/industrial-erp/upload}
  print:
    template-path: classpath:/templates/print
  # 跨域白名单 (CORS Origin), 逗号分隔. 仅列表内的域名/端口可通过浏览器跨域调用 API.
  # 生产环境必须删掉 localhost 条目, 仅保留生产域名.
  # 部署到 NAS 时可通过环境变量 ERP_CORS_ALLOWED_ORIGINS 覆盖 (Spring 占位符).
  cors:
    # 注意: Spring 的 allowedOrigins (因 allowCredentials=true) 不支持通配符, 必须列全具体 origin.
    # 新加子域时同步修改这里, 或在部署 .env 用 ERP_CORS_ALLOWED_ORIGINS 覆盖.
    allowed-origins: ${ERP_CORS_ALLOWED_ORIGINS:https://93gushi.com,https://www.93gushi.com,https://home.93gushi.com,http://home.93gushi.com,http://home.93gushi.com:8088,http://192.168.0.150:8088,http://localhost:5173,http://localhost:5174,http://localhost:8080,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:8080}
  backup:
    path: ${ERP_BACKUP_PATH:${user.home}/erp-backup}
    sql-path: ${ERP_BACKUP_SQL_PATH:./sql}
    mysqldump-path: ${ERP_MYSQLDUMP:mysqldump}
    mysql-path: ${ERP_MYSQL:mysql}
    retention-days: ${ERP_BACKUP_RETENTION_DAYS:30}

logging:
  level:
    root: INFO
    com.industrial.erp: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
